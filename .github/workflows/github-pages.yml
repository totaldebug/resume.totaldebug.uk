name: Deploy Jekyll site to Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: "0"
      - name: Setup Ruby
        uses: ruby/setup-ruby@v1 # v1.161.0
        with:
          ruby-version: 3.3
      - name: Update Gem
        run: gem update --system
      - name: Install Gems
        run: bundle install
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4
      - name: Build with Jekyll
        # Outputs to the './_site' directory by default
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production
      - name: Generate resume PDF
        # Render the print-friendly page to a static PDF so the site can offer
        # a direct download. Chrome is pre-installed on the ubuntu runner.
        run: |
          SITE="_site${{ steps.pages.outputs.base_path }}"
          python3 -m http.server 8000 --directory "$SITE" >/dev/null 2>&1 &
          for i in $(seq 1 10); do
            curl -sf http://localhost:8000/print.html >/dev/null && break
            sleep 1
          done
          google-chrome --headless=new --disable-gpu --no-sandbox \
            --no-pdf-header-footer \
            --print-to-pdf="$SITE/Steven-Marks-Resume.pdf" \
            "http://localhost:8000/print.html"
          test -s "$SITE/Steven-Marks-Resume.pdf"
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "_site${{ steps.pages.outputs.base_path }}"

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
